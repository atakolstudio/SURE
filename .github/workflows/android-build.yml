name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log
        continue-on-error: true
        id: build_step

      - name: Upload build log to Gist on failure
        if: steps.build_step.outcome == 'failure'
        env:
          GIST_TOKEN: ${{ secrets.TEMP_DEBUG_GIST_TOKEN }}
        run: python3 .github/scripts/upload_log_gist.py

      - name: Fail job if build failed
        if: steps.build_step.outcome == 'failure'
        run: exit 1

      - name: Upload APK artifact
        if: steps.build_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sure-debug-apk
          path: app/build/outputs/apk/debug/*.apk
