name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_output.log
        continue-on-error: true
        id: build_step

      - name: Upload build log to Gist on failure
        if: steps.build_step.outcome == 'failure'
        env:
          GIST_TOKEN: ${{ secrets.TEMP_DEBUG_GIST_TOKEN }}
        run: |
          tail -c 55000 build_output.log > tail_log.txt
          python3 - << 'PYEOF'
          import json, urllib.request, os

          with open("tail_log.txt", "r", errors="replace") as f:
              content = f.read()

          payload = json.dumps({
              "description": "SURE build failure log",
              "public": False,
              "files": {"build_output.log": {"content": content}}
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.github.com/gists",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"token {os.environ['GIST_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
              print("GIST_URL:", result["html_url"])
              print("GIST_ID:", result["id"])
          PYEOF

      - name: Fail job if build failed
        if: steps.build_step.outcome == 'failure'
        run: exit 1

      - name: Upload APK artifact
        if: steps.build_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sure-debug-apk
          path: app/build/outputs/apk/debug/*.apk
